{% macro status_banner(message, floating=false) %}
{% if message %}
<div id="status-banner" class="p-strip is-shallow p-status-banner" {% if floating %}style="position: absolute; z-index: 11;"{% endif %}>
  <div class="u-fixed-width">
    <div class="p-notification--caution">
      <div class="p-notification__content">
        <p class="p-notification__message">{{ message }}</p>
        <button class="p-notification__close" aria-controls="status-banner" aria-label="Close notification" type="button">Close</button>
      </div>
    </div>
  </div>
</div>
<script>
  (function() {
    const STORAGE_KEY = "status-banner-dismissed";
    const banner = document.getElementById("status-banner");

    if (sessionStorage.getItem(STORAGE_KEY)) {
      banner.remove();
    } else {
      banner.querySelector(".p-notification__close").addEventListener("click", function() {
        sessionStorage.setItem(STORAGE_KEY, true);
        banner.remove();
      });
    }
  })();
</script>
{% endif %}
{% endmacro %}
